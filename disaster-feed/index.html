function wlHas(id){return wl().includes(id)}
function wlToggle(id){let a=wl();a.includes(id)?a=a.filter(x=>x!==id):a.push(id);localStorage.setItem(WLKEY,JSON.stringify(a));render();}
function byDisaster(){const m={};DATA.projects.forEach(p=>{const k=p.disaster_number;if(!m[k])m[k]={n:k,incident:p.incident,state:p.state,count:0,total:0};m[k].count++;m[k].total+=p.federal||0;});return Object.values(m).sort((a,b)=>b.total-a.total);}
function match(t){const q=state.search.trim().toLowerCase();return !q||t.toLowerCase().includes(q);}
function card(p){
  const star=`<button class="star ${wlHas(p.id)?'on':''}" onclick="wlToggle('${esc(p.id).replace(/'/g,"")}')">★</button>`;
  const ago=p.days_ago<=0?"today":p.days_ago===1?"yesterday":p.days_ago+" days ago";
  return `<div class="card ${p.urgency}"><div class="top"><span class="badge ${p.urgency}">${p.urgency}</span><h4>${esc(p.title)}</h4>${star}</div>
    <p class="meta">📍 ${esc(p.area)} &nbsp;·&nbsp; ${esc(p.incident)} (Disaster #${p.disaster_number})</p>
    <div class="cat">${esc(p.category)}</div>
    <p class="meta"><span class="big">${money(p.federal)}</span> federal share obligated &nbsp;·&nbsp; ${money(p.total)} total &nbsp;·&nbsp; ${esc(p.size)} project</p>
    <p class="meta">💰 Obligated ${p.obligated_date} (${ago}) — recovery work a contractor can bid.</p>
    <p class="meta"><a href="${p.url}" target="_blank">View disaster on FEMA.gov →</a></p></div>`;
}
function viewOverview(){
  const k=DATA.kpi;
  const kpis=`<div class="kpis">
    <div class="kpi red"><div class="ic">${ICONS.disasters}</div><div class="v">${k.fresh}</div><div class="l">Fresh (≤30 days)</div></div>
    <div class="kpi"><div class="ic">${ICONS.recent}</div><div class="v">${k.projects}</div><div class="l">Projects Funded</div></div>
    <div class="kpi green"><div class="ic">💵</div><div class="v">${money(k.total_federal)}</div><div class="l">Federal $ Obligated</div></div>
    <div class="kpi"><div class="ic">${ICONS.overview}</div><div class="v">${k.states_active}</div><div class="l">States Active</div></div></div>`;
  const st={};DATA.projects.forEach(p=>{if(p.state)st[p.state]=(st[p.state]||0)+(p.federal||0)});
  const stA=Object.entries(st).sort((a,b)=>b[1]-a[1]).slice(0,8);const stM=Math.max(...stA.map(x=>x[1]),1);
  const states=stA.map(([n,v])=>`<div class="hbar"><div class="row"><span>${esc(n)}</span><b>${money(v)}</b></div><div class="track"><div class="fill" style="width:${v/stM*100}%"></div></div></div>`).join('')||'<p class="meta">No data.</p>';
  const ct={};DATA.projects.forEach(p=>{ct[p.category]=(ct[p.category]||0)+(p.federal||0)});
  const ctA=Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,7);const ctM=Math.max(...ctA.map(x=>x[1]),1);
  const cats=ctA.map(([n,v])=>`<div class="hbar"><div class="row"><span>${esc(n)}</span><b>${money(v)}</b></div><div class="track"><div class="fill" style="width:${v/ctM*100}%"></div></div></div>`).join('')||'<p class="meta">No data.</p>';
  const top=DATA.projects.slice(0,5).map(p=>`<div class="kv"><span>${esc(p.area)} — ${esc(p.category)}</span><b>${money(p.federal)}</b></div>`).join('')||'<p class="meta">None.</p>';
  return kpis+`<div class="grid2"><div class="panel"><h3>Where the money landed — top states</h3>${states}</div>
    <div class="panel"><h3>What work was funded — by category</h3>${cats}</div></div>
    <div class="panel"><h3>Most recent obligations</h3>${top}</div>`;
}
function viewRecent(){
  const chips=['ALL','FRESH','RECENT','OLDER'].map(v=>`<span class="chip ${state.urg===v?'active':''}" onclick="state.urg='${v}';render()">${v}</span>`).join('');
  let list=DATA.projects.filter(p=>state.urg==='ALL'||p.urgency===state.urg).filter(p=>match(p.area+' '+p.title+' '+p.category+' '+p.incident));
  return `<div class="chips">${chips}</div>`+(list.length?list.map(card).join(''):`<div class="empty">No projects match.</div>`);
}
function viewDisasters(){
  let ds=byDisaster().filter(d=>match((d.incident||'')+' '+(d.state||'')+' '+d.n));
  if(!ds.length)return `<div class="empty">No disasters match.</div>`;
  return `<table><thead><tr><th>Disaster #</th><th>Incident</th><th>State</th><th>Projects</th><th>Federal $ obligated</th><th></th></tr></thead><tbody>`+
    ds.map(d=>`<tr><td><b>#${d.n}</b></td><td>${esc(d.incident)}</td><td>${esc(d.state)}</td><td>${d.count}</td><td><b>${money(d.total)}</b></td>
      <td><a href="https://www.fema.gov/disaster/${d.n}" target="_blank">FEMA →</a></td></tr>`).join('')+`</tbody></table>`;
}
function viewWatchlist(){const ids=wl();const ps=DATA.projects.filter(p=>ids.includes(p.id));
  return ps.length?ps.map(card).join(''):`<div class="empty"><div style="font-size:34px">⭐</div><b>Your watchlist is empty.</b><p>Click ★ on any project to pin it. Saved in your browser.</p></div>`;}
function viewSettings(){
  const cfg=`<div class="panel"><h3>Current configuration</h3>
    <div class="kv"><span>Coverage</span><b>${esc(DATA.states_label)}</b></div>
    <div class="kv"><span>Look-back window</span><b>${DATA.lookback_days} days</b></div>
    <div class="kv"><span>Minimum obligation shown</span><b>${money(DATA.min_amount)}</b></div>
    <div class="kv"><span>Data source</span><b>OpenFEMA (free, public)</b></div>
    <div class="kv"><span>Last refreshed</span><b>${esc(DATA.generated_at)}</b></div>
    <p class="meta" style="margin-top:12px">To filter to your states or change thresholds, just ask your assistant.</p></div>`;
  const road=`<div class="panel"><h3>Roadmap — what's coming</h3>`+DATA.roadmap.map(r=>`<div class="road"><div class="ic">🚀</div><div><div class="t">${esc(r.title)}</div><div class="n">${esc(r.note)}</div></div><span class="tagp">${esc(r.status)}</span></div>`).join('')+`</div>`;
  return cfg+road;
}
const VIEWS={overview:viewOverview,recent:viewRecent,disasters:viewDisasters,watchlist:viewWatchlist,settings:viewSettings};
function renderNav(){$('#nav').innerHTML=NAV.map(n=>{let c=n.count?n.count():null;return `<button class="${state.view===n.k?'active':''}" onclick="state.view='${n.k}';state.urg='ALL';render()">${ICONS[n.k]}<span>${n.label}</span>${c!=null?`<span class="pill">${c}</span>`:''}</button>`;}).join('');}
function render(){renderNav();$('#pageTitle').textContent=TITLES[state.view];
  $('#pageSub').textContent=`${DATA.states_label} · last ${DATA.lookback_days} days · updated ${DATA.generated_at}`;
  $('#brandTag').textContent='FEMA disaster-recovery money';$('#sideFoot').innerHTML=`Built by Synthetic M2M<br>${esc(DATA.from_email)}`;
  $('#content').innerHTML=VIEWS[state.view]();}
$('#search').addEventListener('input',e=>{state.search=e.target.value;render();const s=$('#search');s.focus();s.setSelectionRange(s.value.length,s.value.length);});
$('#themeBtn').addEventListener('click',()=>{const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');$('#themeBtn').textContent=d?'🌙':'☀️';localStorage.setItem('fema_theme',d?'light':'dark');});
if(localStorage.getItem('fema_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');$('#themeBtn').textContent='☀️';}
render();
</script></body></html>
