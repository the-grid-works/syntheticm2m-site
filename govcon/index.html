const TITLES={overview:'Overview',recompetes:'Recompetes Now',calendar:'Recompete Calendar (next 18 months)',

let state={view:'overview',search:'',vuln:'ALL'};

/* watchlist via localStorage */
const WLKEY='govcon_watchlist';
function wl(){try{return JSON.parse(localStorage.getItem(WLKEY)||'[]')}catch(e){return[]}}
function wlHas(id){return wl().includes(id)}
function wlToggle(id){let a=wl();a.includes(id)?a=a.filter(x=>x!==id):a.push(id);localStorage.setItem(WLKEY,JSON.stringify(a));render();}

function uniqueCompetitors(){
  const m={};
  DATA.awards.forEach(a=>{const c=a.competitor; if(!m[a.recipient])m[a.recipient]={name:a.recipient,count:c?c.count:0,total:c?c.total:0,agencies:new Set()};
    m[a.recipient].agencies.add(a.agency);});
  return Object.values(m).sort((x,y)=>(y.total||0)-(x.total||0));
}

function matchSearch(txt){const q=state.search.trim().toLowerCase();return !q||txt.toLowerCase().includes(q);}

/* ---------- renderers ---------- */
function awardCard(a){
  const star=`<button class="star ${wlHas(a.id)?'on':''}" onclick="wlToggle('${esc(a.id)}')" title="Save to watchlist">★</button>`;
  const comp=a.competitor?`<p class="il">📊 Holds <b>${a.competitor.count}</b> other contract(s) ~${money(a.competitor.total)}.`+
    (a.competitor.next?` Next expires <b>${a.competitor.next.date}</b> (${esc(a.competitor.next.agency)}, ${money(a.competitor.next.amount)}).`:'')+`</p>`:'';
  const partners=(a.partners&&a.partners.length)?`<p class="il">🤝 Subcontracts to: ${a.partners.slice(0,4).map(esc).join(', ')}${a.partners.length>4?' …':''} <em>(teaming leads)</em></p>`:'';
  let price='';if(a.ratio){let t=a.ratio>=1.5?`~${a.ratio.toFixed(1)}× the typical award (${money(DATA.median)} median) — larger than usual.`:a.ratio<=.67?`below the typical award size (${money(DATA.median)} median).`:`about the typical award size (${money(DATA.median)} median).`;price=`<p class="il">💲 ${t}</p>`;}
  let excl='';if(a.exclusion)excl=a.exclusion.excluded?`<p class="bad">⛔ ACTIVE FEDERAL EXCLUSION — verify before teaming.</p>`:`<p class="ok">✓ No active federal exclusions (clear to team).</p>`;
  const summary=a.summary?`<p class="summary">${esc(a.summary)}</p>`:'';
  return `<div class="card ${a.vuln_label}">
    <div class="top"><span class="badge ${a.vuln_label}">${a.vuln_label}</span><h4>${esc(a.recipient)}</h4>${star}</div>
    <p class="meta">${esc(a.agency)}${a.sub?' · '+esc(a.sub):''}</p>
    <p class="meta">Amount <b>${money(a.amount)}</b> &nbsp;·&nbsp; Performance ${a.start||'?'} → ${a.end||'?'}</p>
    ${summary}<p class="action ${a.vuln_label}">${a.vuln_label} — ${esc(a.vuln_reason)}</p>
    ${comp}${partners}${price}${excl}
    <p class="verify"><a href="${a.url}" target="_blank">Verify on USAspending →</a></p></div>`;
}

function viewOverview(){
  const k=DATA.kpi; let trendPct='—';
  if(DATA.trend.length>=2){const f=DATA.trend[0].amount,l=DATA.trend[DATA.trend.length-1].amount;if(f>0){const p=(l-f)/f*100;trendPct=(p>=0?'+':'')+p.toFixed(0)+'%';}}
  const kpis=`<div class="kpis">
    <div class="kpi red"><div class="ic">${ICONS.recompetes}</div><div class="v">${k.pursue}</div><div class="l">To Pursue Now</div></div>
    <div class="kpi blue"><div class="ic">${ICONS.overview}</div><div class="v">${k.tracked}</div><div class="l">Contracts Tracked</div></div>
    <div class="kpi green"><div class="ic">${ICONS.calendar}</div><div class="v">${trendPct}</div><div class="l">Sector Trend (3yr)</div></div>
    <div class="kpi amber"><div class="ic">${ICONS.opportunities}</div><div class="v">${money(DATA.median)}</div><div class="l">Median Award</div></div>
  </div>`;
  const max=Math.max(...DATA.trend.map(t=>t.amount),1);
  const bars=DATA.trend.map(t=>`<div class="b"><div class="am">${money(t.amount)}</div><div class="col" style="height:${Math.max(10,t.amount/max*100)}px"></div><div class="fy">FY${t.fy}</div></div>`).join('');
  /* agency breakdown */
  const ag={};DATA.awards.forEach(a=>{ag[a.agency]=(ag[a.agency]||0)+a.amount;});
  const agArr=Object.entries(ag).sort((a,b)=>b[1]-a[1]).slice(0,6);const agMax=Math.max(...agArr.map(x=>x[1]),1);
  const agency=agArr.map(([n,v])=>`<div class="hbar"><div class="row"><span>${esc(n)}</span><b>${money(v)}</b></div><div class="track"><div class="fill" style="width:${v/agMax*100}%"></div></div></div>`).join('');
  const top=DATA.awards.filter(a=>a.vuln_label==='PURSUE').slice(0,5).map(a=>`<div class="kv"><span>${esc(a.recipient)}</span><b>${a.end}</b></div>`).join('')||'<p class="meta">None right now.</p>';
  return kpis+`<div class="grid2">
    <div><div class="panel"><h3>Sector momentum — NAICS ${DATA.naics}</h3><div class="bars">${bars}</div></div>
      <div class="panel"><h3>Where the money is — top agencies (tracked)</h3>${agency||'<p class="meta">No data.</p>'}</div></div>
    <div><div class="panel"><h3>Top recompetes to pursue</h3>${top}</div>
      <div class="panel"><h3>At a glance</h3>
        <div class="kv"><span>Open opportunities (pre-award)</span><b>${k.opportunities}</b></div>
        <div class="kv"><span>Recompetes in next 18 mo</span><b>${k.calendar}</b></div>
        <div class="kv"><span>Total tracked contract value</span><b>${money(k.total_value)}</b></div>
        <div class="kv"><span>Debarment screening</span><b>${k.sam_key_set?'Active':'Off'}</b></div>
      </div></div></div>`;
}

function viewRecompetes(){
  const chips=['ALL','PURSUE','WATCH','MONITOR'].map(v=>`<span class="chip ${state.vuln===v?'active':''}" onclick="state.vuln='${v}';render()">${v}</span>`).join('');
  let list=DATA.awards.filter(a=>state.vuln==='ALL'||a.vuln_label===state.vuln).filter(a=>matchSearch(a.recipient+' '+a.agency+' '+a.sub));
  return `<div class="chips">${chips}</div>`+(list.length?list.map(awardCard).join(''):`<div class="empty"><div class="big">🔍</div>No contracts match this filter.</div>`);
}

function viewCalendar(){
  let rows=DATA.calendar.filter(r=>matchSearch(r.recipient+' '+r.agency));
  if(!rows.length)return `<div class="empty"><div class="big">📅</div>No contracts expiring in the next 18 months match.</div>`;
  return `<table><thead><tr><th></th><th>Expires</th><th>In</th><th>Call</th><th>Incumbent</th><th>Value</th><th>Agency</th><th></th></tr></thead><tbody>`+
    rows.map(r=>{const id=r.url;return `<tr>
      <td><button class="star ${wlHas(id)?'on':''}" onclick="wlToggle('${esc(id)}')">★</button></td>
      <td><b>${r.end_date}</b></td><td>${r.months_left} mo</td>
      <td><span class="badge ${r.vuln_label}">${r.vuln_label}</span></td>
      <td>${esc(r.recipient)}</td><td>${money(r.amount)}</td><td>${esc(r.agency)}</td>
      <td><a href="${r.url}" target="_blank">Verify →</a></td></tr>`;}).join('')+`</tbody></table>`;
}

function viewOpportunities(){
  let ops=DATA.opportunities.filter(o=>matchSearch((o.title||'')+' '+(o.agency||'')));
  if(!ops.length)return `<div class="empty"><div class="big">📡</div><b>No open opportunities loaded yet.</b><p>Your SAM.gov feed is connected — pre-award solicitations appear here as they post. (Refreshes daily; quota-limited keys fill in over time.)</p></div>`;
  return ops.map(o=>`<div class="card"><div class="top"><span class="badge" style="background:var(--accent)">OPEN</span><h4>${esc(o.title)}</h4></div>
    <p class="meta">${esc(o.agency)||'Agency n/a'}</p><p class="meta">Response deadline: <b>${esc(o.deadline)||'see notice'}</b></p>
    <p class="verify"><a href="${o.url}" target="_blank">View on SAM.gov →</a></p></div>`).join('');
}

function viewCompetitors(){
  let cs=uniqueCompetitors().filter(c=>matchSearch(c.name));
  if(!cs.length)return `<div class="empty"><div class="big">👥</div>No competitors match.</div>`;
  return cs.map(c=>`<div class="card"><div class="top"><h4>${esc(c.name)}</h4></div>
    <p class="meta">Active in: ${[...c.agencies].slice(0,3).map(esc).join(', ')}</p>
    <p class="il">📊 Federal footprint: <b>${c.count}</b> contract(s) worth ~${money(c.total)} (sampled).</p></div>`).join('');
}

function viewWatchlist(){
  const ids=wl();const aw=DATA.awards.filter(a=>ids.includes(a.id));
  const cal=DATA.calendar.filter(r=>ids.includes(r.url));
  if(!aw.length&&!cal.length)return `<div class="empty"><div class="big">⭐</div><b>Your watchlist is empty.</b><p>Click the ★ on any contract to pin it here. Saved in your browser.</p></div>`;
  let html=aw.map(awardCard).join('');
  if(cal.length)html+=`<div class="panel"><h3>From the calendar</h3>`+cal.map(r=>`<div class="kv"><span>${esc(r.recipient)} — ${esc(r.agency)}</span><b>${r.end_date}</b></div>`).join('')+`</div>`;
  return html;
}

    <p class="meta" style="margin-top:12px">To change the sector or thresholds, just ask your assistant — these are one-line settings.</p></div>`;
  const road=`<div class="panel"><h3>Roadmap — what's coming</h3>`+DATA.roadmap.map(r=>`<div class="road"><div class="ic">🚀</div>
     <div><div class="t">${esc(r.title)}</div><div class="n">${esc(r.note)}</div></div><span class="tagp">${esc(r.status)}</span></div>`).join('')+`</div>`;
  return cfg+road;
}

const VIEWS={overview:viewOverview,recompetes:viewRecompetes,calendar:viewCalendar,opportunities:viewOpportunities,competitors:viewCompetitors,watchlist:viewWatchlist,settings:viewSettings};

function renderNav(){
  $('#nav').innerHTML=NAV.map(n=>{let c=n.count?n.count():null;
    return `<button class="${state.view===n.k?'active':''}" onclick="state.view='${n.k}';state.vuln='ALL';render()">${ICONS[n.k]}<span>${n.label}</span>${c!=null?`<span class="pill">${c}</span>`:''}</button>`;}).join('');
}
function render(){
  renderNav();
  $('#pageTitle').textContent=TITLES[state.view];
  $('#pageSub').textContent=`NAICS ${DATA.naics} · ${DATA.naics_label} · updated ${DATA.generated_at}`;
  $('#brandTag').textContent='Federal contract intelligence';
  $('#sideFoot').innerHTML=`Built by Synthetic M2M<br>${esc(DATA.from_email)}`;
  let html=VIEWS[state.view]();
  if(state.view==='overview'&&!DATA.kpi.sam_key_set)html=`<div class="banner">💡 Debarment screening is built-in and switches on once a free SAM.gov key is added.</div>`+html;
  $('#content').innerHTML=html;
}

$('#search').addEventListener('input',e=>{state.search=e.target.value;render();
  const s=$('#search');s.focus();});
$('#themeBtn').addEventListener('click',()=>{const h=document.documentElement;
  const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');
  $('#themeBtn').textContent=d?'🌙':'☀️';localStorage.setItem('govcon_theme',d?'light':'dark');});
if(localStorage.getItem('govcon_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');$('#themeBtn').textContent='☀️';}
render();
</script>
</body>
</html>
